# data [right now the idea is to get the base fsd50k than the full 2 mill clips as it is unrealistic to run on my system]
data: 
  dataset_path: ./data/fsd50k
  sample_rate: 32000
  clip_duration: 10.0
  n_mels: 128
  n_time_bins: 256
  frame_to_hop_ratio: 2.5
  batch_size: 64      
  num_workers: 4

# models
model:
  patch_size: 16
  embed_dim: 384           
  depth: 12
  num_heads: 6             
  mlp_ratio: 4.0
  predictor_embed_dim: 192
  predictor_depth: 6
  predictor_num_heads: 6

# masking
masking:
  strategy: random        
  mask_ratio_min: 0.40
  mask_ratio_max: 0.60

# sigreg [not to be used in initial testing purposes] 
#sigreg:
#  num_projections: 64      # M
#  test: epps_pulley        # univariate gaussianity test
#  weight: 1.0              # weight when combined with prediction loss

# loss
#loss:
  prediction_weight: 1.0   # l2 distance between predictor output and target
#  sigreg_weight: 1.0       # sigreg term

# optimizer
optimizer:
  type: adamw
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  gradient_clip: 1.0

# scheduling
schedule:
  warmup_steps: 1000
  warmup_start_lr: 1.0e-6
  total_steps: 100000      
  decay: cosine

# training
training:
  max_steps: 100000
  precision: bf16         
  checkpoint_every: 5000
  log_every: 100
  seed: 42

# paths
paths:
  data_dir: ./data
  log_dir: ./logs
  checkpoint_dir: ./checkpoints

# logs
logging:
  wandb_project: sync-JEPA
  wandb_entity: null       
  run_name: null          
