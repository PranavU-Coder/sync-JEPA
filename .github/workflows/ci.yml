name: CI

on:
  push:
    branches: [ "master" ] 
  pull_request:
    branches: [ "master" ] 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync

      - name: Testing
        run: |
          uv run ruff format --check .
          uv run pytest